# Feishu → Claude Code Gateway
# Env vars: FEISHU_APP_ID, FEISHU_APP_SECRET

feishu:
  app_id: ${FEISHU_APP_ID}
  app_secret: ${FEISHU_APP_SECRET}

claude:
  ttadk_cmd: ttadk           # or full path: /usr/local/bin/ttadk
  model: gpt-5.4
  target: claude
  timeout: 600               # seconds
  session_store_path: .gateway-sessions.json
  allowed_tools: "Bash,Read,Write,Edit,Glob,WebSearch,WebFetch"
  # instruction: "Always respond in Chinese."  # Optional: prepended to user prompt
