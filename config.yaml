# DeerFlow config — Claude Code via ttadk CLI as primary model
config_version: 3

log_level: info

token_usage:
  enabled: true

models:
  # Primary model: Claude Code via ttadk CLI
  # Claude Code runs its own agent loop with built-in tools (Bash, Read, Write, Edit, etc.)
  # DeerFlow acts as UI/session/memory layer only.
  - name: claude-code
    display_name: Claude Code (ttadk)
    description: Claude Code agent via ttadk CLI — full agent loop with built-in tools
    use: deerflow.models.claude_code_cli_provider:ClaudeCodeCliModel
    model: gpt-5.4
    target: claude
    timeout: 600
    # Uncomment to restrict which Claude Code tools are available:
    # allowed_tools: "Bash,Read,Write,Edit,WebSearch"

